name: End-to-End Tests

permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC nightly
  pull_request:
    types: [labeled]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'install.sh'
      - 'install.ps1'
      - 'uninstall.sh'
      - 'uninstall.ps1'
      - 'scripts/**'
      - '.github/workflows/install-scripts-local.yml'
  merge_group:
    branches: [main]
  workflow_dispatch:

env:
  # The daemon is always required — the git proxy only performs attribution
  # when connected to a daemon (see git_handlers.rs). Each job starts a
  # per-job daemon via start-async-daemon.sh (Unix) or inline PowerShell
  # (Windows, using named pipes).
  GIT_AI_TEST_FORCE_TTY: "1"
  GIT_AI_POST_COMMIT_TIMEOUT_MS: "30000"

jobs:
  install-local-unix:
    name: E2E ${{ matrix.agent.name }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'integration')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        agent:
          - name: claude
            npm_pkg: "@anthropic-ai/claude-code"
          - name: codex
            npm_pkg: "@openai/codex"
          - name: gemini
            npm_pkg: "@google/gemini-cli"
          - name: opencode
            npm_pkg: "opencode-ai"

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Build git-ai
        run: cargo build --release --bin git-ai

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install agent CLI — ${{ matrix.agent.name }}
        run: npm install -g "${{ matrix.agent.npm_pkg }}"

      - name: Prepare test home
        run: |
          TEST_HOME="$RUNNER_TEMP/git-ai-home"
          mkdir -p "$TEST_HOME/.config/fish"
          touch "$TEST_HOME/.bashrc" "$TEST_HOME/.zshrc" "$TEST_HOME/.config/fish/config.fish"
          echo "HOME=$TEST_HOME" >> "$GITHUB_ENV"

      - name: Run install.sh with local binary
        env:
          GIT_AI_LOCAL_BINARY: ${{ github.workspace }}/target/release/git-ai
        run: |
          chmod +x ./install.sh
          ./install.sh

      - name: Verify shell configs and agent hooks
        run: |
          INSTALL_DIR="$HOME/.git-ai/bin"
          test -x "$INSTALL_DIR/git-ai"
          grep -F "$INSTALL_DIR" "$HOME/.bashrc"
          grep -F "$INSTALL_DIR" "$HOME/.zshrc"
          grep -F "fish_add_path -g \"$INSTALL_DIR\"" "$HOME/.config/fish/config.fish"
          case "${{ matrix.agent.name }}" in
            claude)
              grep -F "checkpoint claude" "$HOME/.claude/settings.json"
              ;;
            codex)
              # Codex writes inline hooks directly in config.toml (no separate hooks.json).
              # The feature flag is [features].hooks = true.
              grep -F 'hooks = true' "$HOME/.codex/config.toml"
              grep -F "checkpoint codex" "$HOME/.codex/config.toml"
              ;;
            gemini)
              grep -F "checkpoint gemini" "$HOME/.gemini/settings.json"
              ;;
            opencode)
              test -f "$HOME/.config/opencode/plugins/git-ai.ts"
              ;;
          esac
          # Verify ~/.local/bin/git-ai symlink
          test -L "$HOME/.local/bin/git-ai"
          readlink "$HOME/.local/bin/git-ai" | grep -qF "$INSTALL_DIR/git-ai"

      - name: Set up E2E commit test environment
        run: |
          INSTALL_DIR="$HOME/.git-ai/bin"
          # Create a fresh test repo
          rm -rf /tmp/e2e-test-repo
          mkdir -p /tmp/e2e-test-repo
          cd /tmp/e2e-test-repo
          git init
          git config user.email "e2e-test@example.com"
          git config user.name "E2E Test"
          echo "# E2E Test Repo" > README.md
          git add README.md
          # The proxy symlink doesn't exist yet, so 'git' here is still the real system git
          git commit -m "Initial commit"
          # Create proxy symlink AFTER initial commit so it only affects subsequent commits
          ln -sf "$INSTALL_DIR/git-ai" "$INSTALL_DIR/git"
          # Add install dir to PATH for subsequent steps
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Run git-ai install in E2E test repo
        run: |
          INSTALL_DIR="$HOME/.git-ai/bin"
          cd /tmp/e2e-test-repo
          "$INSTALL_DIR/git-ai" install

      - name: Configure git-ai for E2E (notes backend)
        run: |
          INSTALL_DIR="$HOME/.git-ai/bin"
          # Use git_notes backend so verify-synthetic-attribution.sh can read
          # 'git notes --ref=ai show HEAD' directly.
          # SQLite-default coverage lives in tests/integration/sqlite_notes_backend.rs.
          "$INSTALL_DIR/git-ai" config set notes_backend.kind git_notes

      - name: Allow the E2E test repo for collection
        run: |
          # GIT_AI_ALLOWED_REPOSITORIES is additive over the config file (see
          # docs/data-privacy.md): a CI configuration point instead of a
          # `config --add` step that mutates config.json. Exported via
          # $GITHUB_ENV so both the async daemon (next step) and later
          # git-ai invocations (checkpoint, etc.) inherit it. Existing paths
          # are canonicalized automatically at load time — on macOS /tmp is a
          # symlink to /private/tmp — so the raw path is enough.
          echo "GIT_AI_ALLOWED_REPOSITORIES=/tmp/e2e-test-repo" >> "$GITHUB_ENV"

      - name: Start async daemon
        run: |
          source "$GITHUB_WORKSPACE/scripts/nightly/start-async-daemon.sh" \
            "$HOME/.git-ai/bin/git-ai"

      - name: Run synthetic agent commit
        env:
          RESULTS_DIR: /tmp/e2e-results/${{ matrix.agent.name }}
        run: |
          mkdir -p "$RESULTS_DIR"
          bash "$GITHUB_WORKSPACE/scripts/nightly/test-synthetic-checkpoint.sh" \
            "${{ matrix.agent.name }}" /tmp/e2e-test-repo

      - name: Verify attribution pipeline (note, schema, prompts, stats, blame)
        env:
          RESULTS_DIR: /tmp/e2e-results/${{ matrix.agent.name }}
        run: |
          mkdir -p "$RESULTS_DIR"
          bash "$GITHUB_WORKSPACE/scripts/nightly/verify-synthetic-attribution.sh" \
            "${{ matrix.agent.name }}" /tmp/e2e-test-repo

      - name: Stop async daemon
        if: always()
        run: |
          bash "$GITHUB_WORKSPACE/scripts/nightly/stop-async-daemon.sh" \
            "$HOME/.git-ai/bin/git-ai"

      - name: Run uninstall.sh and verify cleanup
        run: |
          INSTALL_DIR="$HOME/.git-ai/bin"
          # The per-job daemon is already stopped; clear its env overrides so the
          # uninstall binary's own daemon shutdown (uninstall.rs step 3) targets
          # the default daemon that 'git-ai install-hooks' started under $HOME.
          unset GIT_AI_DAEMON_HOME GIT_AI_DAEMON_CONTROL_SOCKET GIT_AI_DAEMON_TRACE_SOCKET ASYNC_DAEMON_PID
          "$INSTALL_DIR/git-ai" bg status || true
          # Run the repo's uninstaller (delegates to 'git-ai uninstall --yes').
          bash "$GITHUB_WORKSPACE/uninstall.sh" --yes
          fail=0
          # 1. Binary dir (git-ai + git shim) and the ~/.local/bin/git-ai symlink
          #    are removed (uninstall.rs::remove_binaries).
          if [ -e "$INSTALL_DIR" ]; then
            echo "FAIL: $INSTALL_DIR still exists after uninstall"
            ls -la "$INSTALL_DIR" || true
            fail=1
          fi
          if [ -e "$HOME/.local/bin/git-ai" ] || [ -L "$HOME/.local/bin/git-ai" ]; then
            echo "FAIL: ~/.local/bin/git-ai symlink still exists after uninstall"
            fail=1
          fi
          # 2. The fenced PATH blocks are removed from every rc file install.sh
          #    touched (uninstall.rs::clean_shell_rc_files via the install manifest).
          for rc in "$HOME/.bashrc" "$HOME/.bash_profile" "$HOME/.zshrc" "$HOME/.config/fish/config.fish"; do
            [ -f "$rc" ] || continue
            if grep -nF -e '# >>> git-ai >>>' -e '.git-ai/bin' "$rc"; then
              echo "FAIL: git-ai lines still present in $rc (shown above)"
              fail=1
            fi
          done
          # 3. install-hooks pointed trace2.eventTarget at af_unix:...$HOME/.git-ai/...,
          #    so uninstall.rs::revert_trace2_config removes the whole [trace2] section.
          trace2_remaining="$(git config --global --get-regexp '^trace2\.' || true)"
          if [ -n "$trace2_remaining" ]; then
            echo "FAIL: global trace2 git config still present:"
            echo "$trace2_remaining"
            fail=1
          fi
          # 4. Without --purge the ~/.git-ai data dir (config + local databases) is
          #    kept, and uninstall.rs only LOADS install-manifest.json to drive the
          #    removal — it never deletes the manifest file.
          for kept in "$HOME/.git-ai/install-manifest.json" "$HOME/.git-ai/config.json"; do
            if [ ! -f "$kept" ]; then
              echo "FAIL: $kept missing — uninstall without --purge must keep ~/.git-ai"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "=== uninstall E2E verification FAILED — remaining artifacts ==="
            ls -la "$HOME/.git-ai" "$HOME/.git-ai/bin" "$HOME/.local/bin" 2>/dev/null || true
            git config --global --list 2>/dev/null || true
            exit 1
          fi
          echo "uninstall.sh E2E verification passed"

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-install-${{ matrix.agent.name }}-${{ matrix.os }}
          path: /tmp/e2e-results/
          retention-days: 7
          if-no-files-found: warn

  install-local-windows:
    name: E2E ${{ matrix.agent.name }} on windows-latest
    runs-on: windows-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'integration')
    strategy:
      fail-fast: false
      matrix:
        agent:
          - name: claude
            npm_pkg: "@anthropic-ai/claude-code"
          - name: codex
            npm_pkg: "@openai/codex"
          - name: gemini
            npm_pkg: "@google/gemini-cli"
          - name: opencode
            npm_pkg: "opencode-ai"

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Build git-ai
        run: cargo build --release --bin git-ai

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install agent CLI — ${{ matrix.agent.name }}
        run: npm install -g "${{ matrix.agent.npm_pkg }}"

      - name: Prepare test home
        shell: pwsh
        run: |
          $testHome = Join-Path $env:RUNNER_TEMP "git-ai-home"
          New-Item -ItemType Directory -Force -Path $testHome | Out-Null
          $homeDrive = [System.IO.Path]::GetPathRoot($testHome).TrimEnd('\')
          $homePath = $testHome.Substring($homeDrive.Length)
          Add-Content -Path $env:GITHUB_ENV -Value "TEST_HOME=$testHome"
          Add-Content -Path $env:GITHUB_ENV -Value "TEST_HOME_DRIVE=$homeDrive"
          Add-Content -Path $env:GITHUB_ENV -Value "TEST_HOME_PATH=$homePath"

      - name: Run install.ps1 with local binary
        shell: pwsh
        env:
          GIT_AI_LOCAL_BINARY: ${{ github.workspace }}\target\release\git-ai.exe
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          ./install.ps1

      - name: Verify agent hooks
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          if (-not (Test-Path -LiteralPath (Join-Path $installDir "git-ai.exe"))) { throw "git-ai.exe not installed" }
          switch ("${{ matrix.agent.name }}") {
            "claude" {
              $settings = Join-Path $env:USERPROFILE ".claude\settings.json"
              if (-not (Select-String -Path $settings -Pattern "checkpoint claude")) { throw "Claude hooks not configured" }
            }
            "codex" {
              # Codex writes inline hooks directly in config.toml (no separate hooks.json).
              # The feature flag is [features].hooks = true.
              $config = Join-Path $env:USERPROFILE ".codex\config.toml"
              if (-not (Select-String -Path $config -Pattern "hooks = true")) { throw "Codex hooks feature flag not set in config.toml" }
              if (-not (Select-String -Path $config -Pattern "checkpoint codex")) { throw "Codex hooks not configured in config.toml" }
            }
            "gemini" {
              $settings = Join-Path $env:USERPROFILE ".gemini\settings.json"
              if (-not (Select-String -Path $settings -Pattern "checkpoint gemini")) { throw "Gemini hooks not configured" }
            }
            "opencode" {
              $plugin = Join-Path $env:USERPROFILE ".config\opencode\plugins\git-ai.ts"
              if (-not (Test-Path -LiteralPath $plugin)) { throw "OpenCode plugin not installed" }
            }
          }

      - name: Set up E2E commit test environment
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          if (-not (Test-Path -LiteralPath $gitAiExe)) { throw "git-ai.exe not found at $gitAiExe" }
          # Create a fresh test repo (remove if exists)
          $testRepo = "C:\e2e-test-repo"
          if (Test-Path $testRepo) { Remove-Item -Recurse -Force $testRepo }
          New-Item -ItemType Directory -Force -Path $testRepo | Out-Null
          Set-Location $testRepo
          git init
          git config user.email "e2e-test@example.com"
          git config user.name "E2E Test"
          Set-Content -Path "README.md" -Value "# E2E Test Repo"
          git add README.md
          git commit -m "Initial commit"
          # Copy git-ai.exe to git.exe as proxy (symlinks may require developer mode on Windows)
          Copy-Item -Path $gitAiExe -Destination (Join-Path $installDir "git.exe") -Force
          # Add install dir to PATH for subsequent steps
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          # Export test repo path for subsequent steps
          Add-Content -Path $env:GITHUB_ENV -Value "E2E_TEST_REPO=$testRepo"
          # Run git-ai install in the test repo
          & $gitAiExe install
          if ($LASTEXITCODE -ne 0) { throw "git-ai install failed with exit code $LASTEXITCODE" }

      - name: Configure git-ai for E2E (notes backend) (Windows)
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          # Use git_notes backend so the inline Windows verification step can read
          # 'git notes --ref=ai show HEAD' directly.
          # SQLite-default coverage lives in tests/integration/sqlite_notes_backend.rs.
          & $gitAiExe config set notes_backend.kind git_notes
          if ($LASTEXITCODE -ne 0) { throw "git-ai config set notes_backend.kind failed" }

      - name: Allow the E2E test repo for collection (Windows)
        shell: pwsh
        run: |
          # GIT_AI_ALLOWED_REPOSITORIES is additive over the config file (see
          # docs/data-privacy.md): a CI configuration point instead of a
          # `config --add` step that mutates config.json. Exported via
          # $GITHUB_ENV so both the async daemon (next step) and later
          # git-ai.exe invocations inherit it from their job environment,
          # regardless of which HOME/USERPROFILE ends up resolving the config
          # file. Existing paths are canonicalized automatically at load time.
          $testRepo = $env:E2E_TEST_REPO
          $repoCanonical = (Resolve-Path $testRepo).Path
          Add-Content -Path $env:GITHUB_ENV -Value "GIT_AI_ALLOWED_REPOSITORIES=$repoCanonical"

      - name: Start async daemon (Windows)
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          # Create daemon home with config
          $daemonHome = Join-Path $env:RUNNER_TEMP "git-ai-daemon"
          New-Item -ItemType Directory -Force -Path (Join-Path $daemonHome ".git-ai") | Out-Null
          # Find the real git (not the proxy)
          $realGit = (Get-Command git -CommandType Application | Where-Object { $_.Source -notlike "*\.git-ai\*" } | Select-Object -First 1).Source
          if (-not $realGit) { $realGit = "C:\Program Files\Git\cmd\git.exe" }
          $config = @{
            git_path = $realGit
            disable_auto_updates = $true
            feature_flags = @{ git_hooks_enabled = $false }
            quiet = $false
          } | ConvertTo-Json -Depth 5
          Set-Content -Path (Join-Path $daemonHome ".git-ai\config.json") -Value $config
          # Export daemon env vars
          Add-Content -Path $env:GITHUB_ENV -Value "GIT_AI_DAEMON_HOME=$daemonHome"
          $env:GIT_AI_DAEMON_HOME = $daemonHome
          # Start the daemon in the background
          $proc = Start-Process -FilePath $gitAiExe -ArgumentList "bg","run" -PassThru -NoNewWindow
          Add-Content -Path $env:GITHUB_ENV -Value "ASYNC_DAEMON_PID=$($proc.Id)"
          # Wait for the daemon to be ready (up to 15s)
          $waited = 0
          while ($waited -lt 15000) {
            # Test connectivity by running a simple command that requires the daemon
            $testResult = & $gitAiExe bg status 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Milliseconds 250
            $waited += 250
          }
          if ($waited -ge 15000) { throw "Daemon did not start within 15 seconds" }
          Write-Host "Async daemon started (PID=$($proc.Id))"

      - name: Run synthetic agent commit (Windows)
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $agent = "${{ matrix.agent.name }}"
          $testRepo = $env:E2E_TEST_REPO
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          Set-Location $testRepo
          # Create test file representing agent output
          $testFile = "agent-test-$agent.txt"
          Set-Content -Path $testFile -Value "Hello from $agent synthetic test"
          git add $testFile
          # Build synthetic checkpoint JSON using ConvertTo-Json to avoid YAML heredoc issues
          $epoch = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $testRepoFwd = $testRepo -replace '\\','/'
          $checkpointObj = [ordered]@{
            type = 'ai_agent'
            repo_working_dir = $testRepoFwd
            edited_filepaths = @($testFile)
            transcript = [ordered]@{
              messages = @(
                [ordered]@{ type = 'user'; text = "Create $testFile for synthetic CI test" }
                [ordered]@{ type = 'assistant'; text = 'Creating the file now.' }
              )
            }
            agent_name = $agent
            model = 'synthetic-test-model'
            conversation_id = "synthetic-$agent-$epoch"
          }
          $checkpointJson = $checkpointObj | ConvertTo-Json -Depth 10
          # Feed checkpoint data to git-ai
          $checkpointJson | & $gitAiExe checkpoint agent-v1 --hook-input stdin
          if ($LASTEXITCODE -ne 0) { throw "git-ai checkpoint agent-v1 failed with exit code $LASTEXITCODE" }
          # Commit the staged file
          git commit -m "Synthetic $agent checkpoint test"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed with exit code $LASTEXITCODE" }

      - name: Verify attribution pipeline (Windows)
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $agent = "${{ matrix.agent.name }}"
          $testRepo = $env:E2E_TEST_REPO
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          $resultsDir = "C:\e2e-results\$agent"
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          $log = Join-Path $resultsDir "synthetic-attribution-$agent.txt"
          $lines = [System.Collections.Generic.List[string]]::new()
          $passed = $true
          function Write-Log($msg) { $lines.Add($msg); Write-Host $msg }
          Set-Location $testRepo
          $testFile = "agent-test-$agent.txt"
          # ── 1. Authorship note exists ──────────────────────────────────────────
          $noteRaw = git notes --ref=ai show HEAD 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Log "FAIL: No authorship note on HEAD — post-commit hook did not fire"
            $lines | Set-Content -Path $log
            throw "Verification failed: no authorship note"
          }
          Write-Log "PASS: Authorship note found on HEAD"
          # ── 2. Parse JSON from note ───────────────────────────────────────────
          $noteLines = $noteRaw -split "`n"
          $metaJson = $null
          for ($i = 0; $i -lt $noteLines.Count; $i++) {
            if ($noteLines[$i].Trim().StartsWith('{')) {
              try {
                $metaJson = ($noteLines[$i..($noteLines.Count - 1)] -join "`n") | ConvertFrom-Json
                break
              } catch { continue }
            }
          }
          if ($null -eq $metaJson) {
            Write-Log "FAIL: Could not extract JSON metadata from authorship note"
            $lines | Set-Content -Path $log
            throw "Verification failed: no JSON in note"
          }
          Write-Log "PASS: Authorship note contains parseable JSON metadata"
          # ── 3. Schema version ─────────────────────────────────────────────────
          $schema = $metaJson.schema_version
          if ($schema -ne "authorship/3.0.0") {
            Write-Log "FAIL: Wrong schema_version: '$schema' (expected 'authorship/3.0.0')"
            $lines | Set-Content -Path $log
            throw "Verification failed: wrong schema_version"
          }
          Write-Log "PASS: schema_version = $schema"
          # ── 4. Sessions non-empty ─────────────────────────────────────────────
          $promptCount = 0
          if ($metaJson.prompts) {
            $promptCount = ($metaJson.prompts | Get-Member -MemberType NoteProperty).Count
          }
          $sessionCount = 0
          if ($metaJson.sessions) {
            $sessionCount = ($metaJson.sessions | Get-Member -MemberType NoteProperty).Count
          }
          $totalCount = $promptCount + $sessionCount
          if ($totalCount -lt 1) {
            Write-Log "FAIL: No prompt/session entries in authorship note — checkpoint data was not stored"
            $lines | Set-Content -Path $log
            throw "Verification failed: no prompts or sessions recorded"
          }
          Write-Log "PASS: $totalCount AI session(s) recorded"
          # ── 5. Transcript messages ────────────────────────────────────────────
          $msgCount = 0
          if ($metaJson.prompts) {
            foreach ($key in ($metaJson.prompts | Get-Member -MemberType NoteProperty).Name) {
              $record = $metaJson.prompts.$key
              if ($record.messages) { $msgCount += $record.messages.Count }
            }
          }
          if ($metaJson.sessions) {
            foreach ($key in ($metaJson.sessions | Get-Member -MemberType NoteProperty).Name) {
              $record = $metaJson.sessions.$key
              if ($record.messages) { $msgCount += $record.messages.Count }
            }
          }
          if ($msgCount -gt 0) {
            Write-Log "PASS: Transcript captured: $msgCount message(s) recorded"
          } else {
            Write-Log "WARN: No transcript messages — sessions format does not embed transcripts inline"
          }
          # ── 6. git-ai stats reports AI additions ──────────────────────────────
          $statsRaw = & $gitAiExe stats HEAD --json 2>&1
          $statsJson = $null
          $statsLines = $statsRaw -split "`n"
          for ($i = 0; $i -lt $statsLines.Count; $i++) {
            if ($statsLines[$i] -match '^\[DEBUG\]') { continue }
            if ($statsLines[$i].Trim().StartsWith('{')) {
              try {
                $statsJson = ($statsLines[$i..($statsLines.Count - 1)] -join "`n") | ConvertFrom-Json
                break
              } catch { continue }
            }
          }
          if ($null -eq $statsJson) {
            Write-Log "FAIL: git-ai stats HEAD --json produced no parseable JSON"
            $lines | Set-Content -Path $log
            throw "Verification failed: stats JSON not parseable"
          }
          $aiAdds = [int]$statsJson.ai_additions
          if ($aiAdds -lt 1) {
            Write-Log "FAIL: git-ai stats HEAD reports ai_additions=0 — AI work not tracked"
            $lines | Set-Content -Path $log
            throw "Verification failed: ai_additions=0"
          }
          Write-Log "PASS: git-ai stats HEAD: ai_additions=$aiAdds"
          # ── 7. Test file in note text (warn only) ─────────────────────────────
          if ($noteRaw -match [regex]::Escape($testFile)) {
            Write-Log "PASS: $testFile appears in authorship note"
          } else {
            Write-Log "WARN: $testFile not found in authorship note text"
          }
          # ── 8. git-ai blame (warn only) ───────────────────────────────────────
          $blameOut = & $gitAiExe blame $testFile 2>&1
          if ($blameOut -match 'ai-generated|generated|ai_human_author' -or $blameOut -match [regex]::Escape($agent)) {
            Write-Log "PASS: AI attribution visible in git-ai blame output for $testFile"
          } else {
            Write-Log "WARN: git-ai blame does not show explicit AI attribution for $testFile"
            Write-Host "Blame output: $blameOut"
          }
          $lines | Set-Content -Path $log
          Write-Log "=== Synthetic attribution verification COMPLETE: $agent ==="

      - name: Stop async daemon (Windows)
        if: always()
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          if (Test-Path $gitAiExe) {
            & $gitAiExe bg shutdown 2>&1 | Out-Null
          }
          if ($env:ASYNC_DAEMON_PID) {
            $proc = Get-Process -Id $env:ASYNC_DAEMON_PID -ErrorAction SilentlyContinue
            if ($proc) {
              $proc | Stop-Process -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Run uninstall.ps1 and verify cleanup (Windows)
        shell: pwsh
        env:
          HOME: ${{ env.TEST_HOME }}
          USERPROFILE: ${{ env.TEST_HOME }}
          HOMEDRIVE: ${{ env.TEST_HOME_DRIVE }}
          HOMEPATH: ${{ env.TEST_HOME_PATH }}
        run: |
          $installDir = Join-Path $env:USERPROFILE ".git-ai\bin"
          $gitAiExe = Join-Path $installDir "git-ai.exe"
          # The per-job daemon is already stopped; clear its env overrides so the
          # uninstall binary's own daemon shutdown (uninstall.rs step 3) targets
          # the default daemon that 'git-ai install-hooks' started under this home.
          Remove-Item Env:GIT_AI_DAEMON_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:GIT_AI_DAEMON_CONTROL_SOCKET -ErrorAction SilentlyContinue
          Remove-Item Env:GIT_AI_DAEMON_TRACE_SOCKET -ErrorAction SilentlyContinue
          & $gitAiExe bg status 2>&1 | Out-Host
          # Run the repo's uninstaller (delegates to 'git-ai uninstall --yes').
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          & (Join-Path $env:GITHUB_WORKSPACE "uninstall.ps1") -Yes
          if ($LASTEXITCODE -ne 0) { throw "uninstall.ps1 failed with exit code $LASTEXITCODE" }
          $failures = @()
          # 1. On Windows uninstall.rs cannot delete a running exe, so it reports
          #    the bin dir and asks the user to remove it after the process exits.
          #    Complete the documented manual step here; a successful removal also
          #    proves that uninstall's daemon shutdown released the exe lock.
          if (Test-Path -LiteralPath $installDir) {
            $removed = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                Remove-Item -Recurse -Force -LiteralPath $installDir -ErrorAction Stop
                $removed = $true
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $removed) { $failures += "could not remove $installDir — a git-ai process still holds a lock" }
          }
          if (Test-Path -LiteralPath $gitAiExe) {
            $failures += "git-ai.exe still present under $installDir"
          }
          # 2. uninstall.rs::revert_trace2_config now recognises both Unix socket
          #    paths (containing '.git-ai') and Windows named-pipe paths
          #    (prefix '\\.\pipe\git-ai-').  With this fix, trace2.eventTarget
          #    must be fully unset after uninstall.
          $trace2Target = git config --global --get trace2.eventTarget 2>$null
          if ($LASTEXITCODE -ne 0) { $trace2Target = $null }
          if ($trace2Target) {
            $failures += "trace2.eventTarget must be unset after uninstall but got: $trace2Target"
          }
          # 3. Without --purge the ~/.git-ai data dir (config + local databases) is
          #    kept, and uninstall.rs only LOADS install-manifest.json to drive the
          #    removal — it never deletes the manifest file.
          foreach ($kept in @(
            (Join-Path $env:USERPROFILE ".git-ai\install-manifest.json"),
            (Join-Path $env:USERPROFILE ".git-ai\config.json")
          )) {
            if (-not (Test-Path -LiteralPath $kept)) {
              $failures += "$kept missing — uninstall without --purge must keep ~/.git-ai"
            }
          }
          # 4. rc fence blocks must be removed: uninstall.rs now resolves home via
          #    the project's env-honoring home_dir() (respects USERPROFILE) so it
          #    correctly targets the redirected TEST_HOME used by this job.
          foreach ($rc in @((Join-Path $env:USERPROFILE ".bashrc"), (Join-Path $env:USERPROFILE ".bash_profile"))) {
            if ((Test-Path -LiteralPath $rc) -and (Select-String -Path $rc -Pattern '# >>> git-ai >>>' -SimpleMatch -Quiet)) {
              $failures += "git-ai fence block still present in $rc after uninstall"
            }
          }
          if ($failures.Count -gt 0) {
            Write-Host "=== uninstall E2E verification FAILED — remaining artifacts ==="
            foreach ($f in $failures) { Write-Host "FAIL: $f" }
            if (Test-Path -LiteralPath $installDir) { Get-ChildItem -Recurse -LiteralPath $installDir | Out-Host }
            $dataDir = Join-Path $env:USERPROFILE ".git-ai"
            if (Test-Path -LiteralPath $dataDir) { Get-ChildItem -LiteralPath $dataDir | Out-Host }
            Get-Process -Name "git-ai*" -ErrorAction SilentlyContinue | Out-Host
            git config --global --list 2>$null | Out-Host
            throw "uninstall E2E verification failed: $($failures -join '; ')"
          }
          Write-Host "uninstall.ps1 E2E verification passed"
          exit 0

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-install-${{ matrix.agent.name }}-windows-latest
          path: C:\e2e-results\
          retention-days: 7
          if-no-files-found: warn
